<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Mother's Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #fff1f2;
            --petal-primary: #f48fb1;
            --text-main: #5d4037;
            --accent-pink: #d81b60;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #ffffff 0%, #fff1f2 100%);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            touch-action: none;
        }

        .content-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            width: 90%;
            max-width: 800px;
            opacity: 0;
            transition: opacity 2s ease, transform 1.5s cubic-bezier(0.2, 1, 0.3, 1);
            pointer-events: none;
        }

        .content-container.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: all;
        }

        .subtext {
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: clamp(0.7rem, 2.5vw, 1rem);
            margin-bottom: 0.5rem;
            color: #8d6e63;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 10vw, 4.5rem);
            margin: 0;
            color: var(--accent-pink);
            line-height: 1.2;
        }

        .magic-btn {
            margin-top: 3rem;
            padding: 1.2rem 3.5rem;
            border-radius: 9999px;
            background: white;
            color: var(--accent-pink);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(216, 27, 96, 0.08);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-left: auto;
            margin-right: auto;
            position: relative;
            z-index: 102;
        }

        .magic-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(216, 27, 96, 0.15);
            background: #fff;
        }

        .balloon {
            position: absolute;
            pointer-events: auto;
            z-index: 5;
            will-change: transform, opacity;
            cursor: pointer;
        }

        .balloon-inner {
            width: clamp(35px, 6vw, 55px);
            height: clamp(45px, 7.5vw, 68px);
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: relative;
            opacity: 0.45;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
        }

        .balloon-string {
            position: absolute;
            bottom: -25px;
            left: 50%;
            width: 1px;
            height: 30px;
            background: rgba(0,0,0,0.06);
        }

        .petal {
            position: absolute;
            width: 14px;
            height: 14px;
            pointer-events: none;
            z-index: 10;
            opacity: 0.4;
        }

        .footer {
            position: absolute;
            bottom: 2.5rem;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.4;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="content-container" id="main-content">
        <p class="subtext">To the world's best Mom</p>
        <h1>Happy Mother's Day</h1>
        <button class="magic-btn" onclick="triggerLoveBurst(event)">
            <span style="font-size: 1.2rem;">🌸</span> SEND MORE LOVE
        </button>
    </div>

    <div class="footer">
        Designed with Love
    </div>

    <script>
        let width = window.innerWidth;
        let height = window.innerHeight;
        const petals = [];
        const balloons = [];
        const mouse = { x: -1000, y: -1000 };
        const isMobile = width < 768;
        
        // High density of balloons to be "all over"
        const MAX_BALLOONS = isMobile ? 50 : 100;
        const MAX_PETALS = isMobile ? 30 : 60;

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        class Balloon {
            constructor(isInitial = false) {
                this.el = document.createElement('div');
                this.el.className = 'balloon';
                this.popped = false;
                
                this.inner = document.createElement('div');
                this.inner.className = 'balloon-inner';
                
                const string = document.createElement('div');
                string.className = 'balloon-string';
                
                this.el.appendChild(this.inner);
                this.el.appendChild(string);
                document.body.appendChild(this.el);
                
                // Direct hover listener for instant response
                this.el.onmouseenter = () => this.pop();
                
                this.reset(isInitial);
            }

            reset(isInitial = false) {
                this.popped = false;
                this.el.style.opacity = '1';
                this.inner.style.transform = 'scale(1)';
                
                // Randomly distributed across the screen
                this.x = Math.random() * width;
                this.y = isInitial ? (Math.random() * height) : (height + 150 + (Math.random() * 200));
                
                this.vy = -(Math.random() * 0.8 + 0.3);
                this.vx = (Math.random() - 0.5) * 0.2;
                
                // Pink/Red color palette for "small red balloons"
                const colors = ['#f48fb1', '#f06292', '#ffcdd2', '#ff8a80', '#ef9a9a', '#e91e63'];
                this.inner.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                this.scale = 0.6 + Math.random() * 0.5;
                this.rotation = (Math.random() - 0.5) * 15;
                this.oscillationSpeed = 0.001 + Math.random() * 0.002;
            }

            pop() {
                if (this.popped) return;
                this.popped = true;
                this.inner.style.transform = 'scale(1.6)';
                this.el.style.opacity = '0';
                
                // Respawn after a delay
                setTimeout(() => {
                    this.reset();
                }, 1500);
            }

            update() {
                if (this.popped) return;

                this.y += this.vy;
                const wave = Math.sin(Date.now() * this.oscillationSpeed) * 0.4;
                this.x += this.vx + wave;

                if (this.y < -150) {
                    this.y = height + 150;
                    this.x = Math.random() * width;
                }

                // Hover proximity check
                const dx = this.x - mouse.x;
                const dy = (this.y - 30) - mouse.y;
                const distSq = dx*dx + dy*dy;
                
                // Radius of 70px for "passing over" to trigger
                if (distSq < 4900) {
                    this.pop();
                }

                this.el.style.transform = `translate3d(${this.x}px, ${this.y}px, 0) rotate(${this.rotation}deg) scale(${this.scale})`;
            }
        }

        class Petal {
            constructor(isBurst = false, x, y) {
                this.el = document.createElement('div');
                this.el.className = 'petal';
                this.el.innerHTML = `<svg viewBox="0 0 24 24" fill="#f48fb1"><path d="M12,21C12,21 4,16 4,10C4,4 12,2 12,2C12,2 20,4 20,10C20,16 12,21 12,21Z"/></svg>`;
                document.body.appendChild(this.el);
                this.reset(isBurst, x, y);
            }

            reset(isBurst = false, x, y) {
                this.x = x ?? Math.random() * width;
                this.y = y ?? (Math.random() * height * -1);
                
                const angle = Math.random() * Math.PI * 2;
                const speed = isBurst ? (Math.random() * 8 + 4) : (Math.random() * 1.5 + 0.5);
                
                this.vx = Math.cos(angle) * speed;
                this.vy = isBurst ? Math.sin(angle) * speed : (Math.random() * 1.5 + 1);
                this.rotation = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 3;
                this.scale = 0.4 + Math.random() * 0.6;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotSpeed;

                this.vx *= 0.98;
                if (this.y > height + 50) {
                    this.y = -50;
                    this.x = Math.random() * width;
                }
                
                this.el.style.transform = `translate3d(${this.x}px, ${this.y}px, 0) rotate(${this.rotation}deg) scale(${this.scale})`;
            }
        }

        function triggerLoveBurst(e) {
            const rect = e.target.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top;

            for (let i = 0; i < 15; i++) {
                const p = new Petal(true, cx, cy);
                petals.push(p);
                if (petals.length > 100) {
                    const old = petals.shift();
                    old.el.remove();
                }
            }
        }

        function init() {
            // Populate initially across the screen
            for (let i = 0; i < MAX_BALLOONS; i++) {
                balloons.push(new Balloon(true));
            }
            for (let i = 0; i < MAX_PETALS; i++) {
                petals.push(new Petal());
            }

            function animate() {
                balloons.forEach(b => b.update());
                petals.forEach(p => p.update());
                requestAnimationFrame(animate);
            }
            animate();

            setTimeout(() => {
                document.getElementById('main-content').classList.add('show');
            }, 500);
        }

        window.onload = init;
        window.onresize = () => {
            width = window.innerWidth;
            height = window.innerHeight;
        };
    </script>
</body>
</html>
