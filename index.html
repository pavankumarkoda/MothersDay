<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Mother's Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #fff1f2;
            --petal-primary: #f48fb1;
            --text-main: #5d4037;
            --accent-pink: #d81b60;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #ffffff 0%, #fff1f2 100%);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            touch-action: none;
        }

        .content-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            width: 90%;
            max-width: 800px;
            opacity: 0;
            transition: opacity 2s ease, transform 1.5s cubic-bezier(0.2, 1, 0.3, 1);
            pointer-events: none;
        }

        .content-container.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: all;
        }

        .subtext {
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: clamp(0.7rem, 2.5vw, 1rem);
            margin-bottom: 0.5rem;
            color: #8d6e63;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 10vw, 4.5rem);
            margin: 0;
            color: var(--accent-pink);
            line-height: 2.2;
            font-weight:500;
        }

        .magic-btn {
            margin-top: 3rem;
            padding: 1.2rem 3.5rem;
            border-radius: 9999px;
            background: white;
            color: var(--accent-pink);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(216, 27, 96, 0.08);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-left: auto;
            margin-right: auto;
            position: relative;
            z-index: 102;
        }

        .magic-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(216, 27, 96, 0.15);
            background: #fff;
        }

        .balloon {
            position: absolute;
            pointer-events: auto;
            z-index: 5;
            will-change: transform, opacity;
            cursor: pointer;
        }

        .balloon-inner {
            width: clamp(35px, 6vw, 55px);
            height: clamp(45px, 7.5vw, 68px);
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: relative;
            opacity: 0.45;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
        }

        .balloon-string {
            position: absolute;
            bottom: -25px;
            left: 50%;
            width: 1px;
            height: 30px;
            background: rgba(0,0,0,0.06);
        }

        .petal {
            position: absolute;
            width: 14px;
            height: 14px;
            pointer-events: none;
            z-index: 10;
            opacity: 0.4;
        }

        .footer {
            position: absolute;
            bottom: 2.5rem;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.4;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div class="content-container" id="main-content">
    <h1 class="subtext" style="font-weight: 300; letter-spacing: 8px; text-transform: uppercase; font-size: clamp(0.7rem, 2.5vw, 1rem); margin-bottom: 0.5rem; color: #8d6e63; opacity: 0.8;">
        To the world's best Mom
    </h1>
    
    <h1 style="font-family: 'Great Vibes', cursive; font-size: clamp(2.5rem, 10vw, 4.5rem); margin: 1rem 0 0 0; color: var(--accent-pink); line-height: 1.2; font-weight: 700; background-color: #fff0f5; display: inline-block; padding: 8px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(216, 27, 96, 0.1);">
        Happy Mother's Day
    </h1>
    
    <!-- Main Interactive Button -->
    <button id="main-magic-btn" class="magic-btn" onclick="handleMainAction(event)">
        <span id="btn-icon" style="font-size: 1.2rem;">🌸</span> 
        <span id="btn-text">Tap Here</span>
    </button>
</div>
<!-- Swipe Demo Hand -->
<div id="swipe-demo" style="position: fixed; top: 50%; left: 50%; z-index: 999; pointer-events: none; opacity: 0.7; transform: translate(-50%, -50%); transition: opacity 0.5s ease;">
    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" style="animation: swipeMove 2s ease-in-out infinite;">
        <path d="M12.5 8.5C13.3 8.5 14 7.8 14 7C14 6.2 13.3 5.5 12.5 5.5C11.7 5.5 11 6.2 11 7C11 7.8 11.7 8.5 12.5 8.5Z" fill="#5d4037"/>
        <path d="M15.5 10.5C16.3 10.5 17 9.8 17 9C17 8.2 16.3 7.5 15.5 7.5C14.7 7.5 14 8.2 14 9C14 9.8 14.7 10.5 15.5 10.5Z" fill="#5d4037"/>
        <path d="M9.5 10.5C10.3 10.5 11 9.8 11 9C11 8.2 10.3 7.5 9.5 7.5C8.7 7.5 8 8.2 8 9C8 9.8 8.7 10.5 9.5 10.5Z" fill="#5d4037"/>
        <path d="M6.5 12.5C7.3 12.5 8 11.8 8 11C8 10.2 7.3 9.5 6.5 9.5C5.7 9.5 5 10.2 5 11C5 11.8 5.7 12.5 6.5 12.5Z" fill="#5d4037"/>
        <path d="M9 15.5L10.5 14L12 15.5L13.5 14L15 15.5L16 14.5L17 15.5V18.5C17 19.6 16.1 20.5 15 20.5H9C7.9 20.5 7 19.6 7 18.5V15.5L8 14.5L9 15.5Z" fill="#5d4037"/>
        <style>
            @keyframes swipeMove {
                0%, 100% { transform: translateX(-40px); }
                50% { transform: translateX(40px); }
            }
        </style>
    </svg>
    <div style="font-family: 'Inter', sans-serif; font-size: 0.7rem; color: #5d4037; text-align: center; margin-top: 5px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500;">Swipe to Pop</div>
</div>
    <div class="footer" style="text-align: center; font-family: sans-serif; color: #555; padding: 20px 0;">
    Designed with Love by
    <h5 style="display: inline; margin: 0; font-size: 1em; font-weight: 600;">
        <a href="https://weddinginvitation.store" target="_blank" rel="noopener" 
           style="color: #c08497; text-decoration: none;"
           onmouseover="this.style.color='#a35d73'; this.style.textDecoration='underline'" 
           onmouseout="this.style.color='#c08497'; this.style.textDecoration='underline'">
           weddinginvitation.store
        </a>
    </h5>
    </div>

    <script>
        // Hide swipe demo after 6 seconds or on first interaction
setTimeout(() => {
    const demo = document.getElementById('swipe-demo');
    if(demo) demo.style.opacity = '0';
}, 6000);

const hideDemo = () => {
    const demo = document.getElementById('swipe-demo');
    if(demo) demo.style.opacity = '0';
};
window.addEventListener('mousemove', hideDemo, { once: true });
window.addEventListener('touchstart', hideDemo, { once: true });
        let width = window.innerWidth;
        let height = window.innerHeight;
        const petals = [];
        const balloons = [];
        const mouse = { x: -1000, y: -1000 };
        const isMobile = width < 768;
        
        const MAX_BALLOONS = isMobile ? 60 : 120;
        const MAX_PETALS = isMobile ? 30 : 60;

        // Audio Context for "Pop" sounds
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playPopSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440 + Math.random() * 400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function handleMainAction(e) {
            initAudio();
            const audio = document.getElementById('bg-music');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            
            // Toggle Music
            if (audio.paused) {
                audio.play().catch(err => console.log("Audio blocked. Ensure song.mp3 is in the same folder."));
                btnText.innerText = "MUSIC PLAYING";
                btnIcon.innerText = "⏸️";
            } else {
                audio.pause();
                btnText.innerText = "SEND MORE LOVE";
                btnIcon.innerText = "🌸";
            }

            // Burst Effect (Petals)
            const rect = e.target.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top;

            for (let i = 0; i < 20; i++) {
                const p = new Petal(true, cx, cy);
                petals.push(p);
                if (petals.length > 100) {
                    const old = petals.shift();
                    old.el.remove();
                }
            }
        }

        const updatePointer = (e) => {
            mouse.x = e.clientX || (e.touches && e.touches[0].clientX);
            mouse.y = e.clientY || (e.touches && e.touches[0].clientY);
            initAudio(); // Initialize audio on first interaction
        };

        window.addEventListener('mousemove', updatePointer);
        window.addEventListener('touchstart', updatePointer, { passive: true });
        window.addEventListener('touchmove', updatePointer, { passive: true });

        class Balloon {
            constructor(isInitial = false) {
                this.el = document.createElement('div');
                this.el.className = 'balloon';
                this.popped = false;
                
                this.inner = document.createElement('div');
                this.inner.className = 'balloon-inner';
                
                const string = document.createElement('div');
                string.className = 'balloon-string';
                
                this.el.appendChild(this.inner);
                this.el.appendChild(string);
                document.body.appendChild(this.el);
                
                this.reset(isInitial);
            }

            reset(isInitial = false) {
                this.popped = false;
                this.el.style.opacity = '1';
                this.inner.style.transform = 'scale(1)';
                
                this.x = Math.random() * width;
                this.y = isInitial ? (Math.random() * height) : (height + 150 + (Math.random() * 200));
                
                this.vy = -(Math.random() * 0.8 + 0.3);
                this.vx = (Math.random() - 0.5) * 0.2;
                
                const colors = ['#f48fb1', '#f06292', '#ffcdd2', '#ff8a80', '#ef9a9a', '#e91e63'];
                this.inner.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                this.scale = 0.6 + Math.random() * 0.5;
                this.rotation = (Math.random() - 0.5) * 15;
                this.oscillationSpeed = 0.001 + Math.random() * 0.002;
            }

            pop() {
                if (this.popped) return;
                this.popped = true;
                this.inner.style.transform = 'scale(1.8)';
                this.el.style.opacity = '0';
                playPopSound();
                
                setTimeout(() => {
                    this.reset();
                }, 1500);
            }

            update() {
                if (this.popped) return;

                this.y += this.vy;
                const wave = Math.sin(Date.now() * this.oscillationSpeed) * 0.4;
                this.x += this.vx + wave;

                if (this.y < -150) {
                    this.y = height + 150;
                    this.x = Math.random() * width;
                }

                // Interaction Distance
                const dx = this.x - mouse.x;
                const dy = (this.y - 30) - mouse.y;
                const distSq = dx*dx + dy*dy;
                
                // POP on hover or touch (within 70px radius)
                if (distSq < 4900) {
                    this.pop();
                }

                this.el.style.transform = `translate3d(${this.x}px, ${this.y}px, 0) rotate(${this.rotation}deg) scale(${this.scale})`;
            }
        }

        class Petal {
            constructor(isBurst = false, x, y) {
                this.el = document.createElement('div');
                this.el.className = 'petal';
                this.el.innerHTML = `<svg viewBox="0 0 24 24" fill="#f48fb1"><path d="M12,21C12,21 4,16 4,10C4,4 12,2 12,2C12,2 20,4 20,10C20,16 12,21 12,21Z"/></svg>`;
                document.body.appendChild(this.el);
                this.reset(isBurst, x, y);
            }

            reset(isBurst = false, x, y) {
                this.x = x ?? Math.random() * width;
                this.y = y ?? (Math.random() * height * -1);
                
                const angle = Math.random() * Math.PI * 2;
                const speed = isBurst ? (Math.random() * 8 + 4) : (Math.random() * 1.5 + 0.5);
                
                this.vx = Math.cos(angle) * speed;
                this.vy = isBurst ? Math.sin(angle) * speed : (Math.random() * 1.5 + 1);
                this.rotation = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 3;
                this.scale = 0.4 + Math.random() * 0.6;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotSpeed;

                this.vx *= 0.98;
                if (this.y > height + 50) {
                    this.y = -50;
                    this.x = Math.random() * width;
                }
                
                this.el.style.transform = `translate3d(${this.x}px, ${this.y}px, 0) rotate(${this.rotation}deg) scale(${this.scale})`;
            }
        }

        function init() {
            for (let i = 0; i < MAX_BALLOONS; i++) {
                balloons.push(new Balloon(true));
            }
            for (let i = 0; i < MAX_PETALS; i++) {
                petals.push(new Petal());
            }

            function animate() {
                balloons.forEach(b => b.update());
                petals.forEach(p => p.update());
                requestAnimationFrame(animate);
            }
            animate();

            setTimeout(() => {
                document.getElementById('main-content').classList.add('show');
            }, 500);
        }

        window.onload = init;
        window.onresize = () => {
            width = window.innerWidth;
            height = window.innerHeight;
        };
    </script>
</body>
</html>
